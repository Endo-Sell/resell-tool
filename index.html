<!DOCTYPE html>
<html lang="de">
<head> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resell Tool</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    const supabaseUrl = "https://ktoxffkmnmaximfpyrhp.supabase.co";
    const supabaseKey = "sb_publishable_Y6TMbHHyLcg-IwIbxN55uA_pbCx_J90";
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resell Tool</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: #1b1b1b;
      border: 1px solid #2b2b2b;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1, h2 {
      margin-top: 0;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      box-sizing: border-box;
    }
    input {
      background: #2a2a2a;
      color: white;
    }
    button {
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    .item {
      padding: 12px;
      border-bottom: 1px solid #333;
    }
    .small {
      color: #aaa;
      font-size: 14px;
    }
    .profit {
      color: #22c55e;
      font-weight: bold;
    }
    .danger {
      background: #ef4444;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Resell Dashboard</h1>
    
    <p class="small">Deine erste echte Reselling-App</p>
    <div class="card" id="authBox">
  <h2>Login / Signup</h2>
  <input id="email" type="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Passwort" />
  <button onclick="signUp()">Signup</button>
  <button onclick="signIn()">Login</button>
  <button onclick="signOut()" class="danger">Logout</button>
  <p id="authStatus" class="small"></p>
</div>

<div id="toolArea">

    <div class="card">
      <h2>Item hinzufügen</h2>
      <input id="title" placeholder="Titel z. B. Ralph Lauren Zipper" />
      <input id="brand" placeholder="Brand" />
      <input id="buyPrice" placeholder="Einkaufspreis z. B. 20" type="number" />
      <input id="listPrice" placeholder="Listenpreis z. B. 45" type="number" />
      <input id="size" placeholder="Größe z. B. L" />
      <button onclick="addItem()">Item speichern</button>
    </div>

    <div class="card">
      <h2>Übersicht</h2>
      <p id="stats">Noch keine Items gespeichert.</p>
    </div>

    <div class="card">
      <h2>Deine Items</h2>
      <div id="items"></div>
    </div>
  </div>

  <script>
  let items = [];

  async function loadItems() {
    const { data, error } = await supabaseClient
      .from("items")
      .select("*")
      .order("id", { ascending: false });

    if (error) {
      console.error("Fehler beim Laden:", error);
      alert("Fehler beim Laden: " + error.message);
      return;
    }

    items = data || [];
    renderItems();
  }

  async function addItem() {
    const title = document.getElementById("title").value.trim();
    const brand = document.getElementById("brand").value.trim();
    const buyPrice = document.getElementById("buyPrice").value.trim();
    const listPrice = document.getElementById("listPrice").value.trim();
    const size = document.getElementById("size").value.trim();

    if (!title) {
      alert("Bitte Titel eingeben.");
      return;
    }

    const { error } = await supabaseClient
      .from("items")
      .insert([
        {
          title: title,
          brand: brand,
          buy_price: buyPrice ? Number(buyPrice) : 0,
          list_price: listPrice ? Number(listPrice) : 0,
          sold_price: 0,
          size: size,
          notes: ""
        }
      ]);

    if (error) {
      console.error("Fehler beim Speichern:", error);
      alert("Fehler beim Speichern: " + error.message);
      return;
    }

    document.getElementById("title").value = "";
    document.getElementById("brand").value = "";
    document.getElementById("buyPrice").value = "";
    document.getElementById("listPrice").value = "";
    document.getElementById("size").value = "";

    await loadItems();
  }

  async function deleteItem(id) {
    const { error } = await supabaseClient
      .from("items")
      .delete()
      .eq("id", id);

    if (error) {
      console.error("Fehler beim Löschen:", error);
      alert("Fehler beim Löschen: " + error.message);
      return;
    }

    await loadItems();
  }

  function renderItems() {
    const itemsDiv = document.getElementById("items");
    const stats = document.getElementById("stats");

    if (!items.length) {
      itemsDiv.innerHTML = "<p class='small'>Noch keine Items vorhanden.</p>";
      stats.textContent = "Noch keine Items gespeichert.";
      return;
    }

async function signUp() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Bitte Email und Passwort eingeben.");
    return;
  }

  const { error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) {
    alert("Signup Fehler: " + error.message);
    return;
  }

  document.getElementById("authStatus").textContent =
    "Signup erfolgreich. Falls Email-Bestätigung aktiv ist, bestätige zuerst deine Mail.";
}

async function signIn() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Bitte Email und Passwort eingeben.");
    return;
  }

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert("Login Fehler: " + error.message);
    return;
  }

  document.getElementById("authStatus").textContent = "Login erfolgreich.";
  await checkUser();
  await loadItems();
}

async function signOut() {
  const { error } = await supabaseClient.auth.signOut();

  if (error) {
    alert("Logout Fehler: " + error.message);
    return;
  }

  document.getElementById("authStatus").textContent = "Ausgeloggt.";
  await checkUser();
}

async function checkUser() {
  const { data, error } = await supabaseClient.auth.getUser();

  if (error) {
    console.error(error);
    return;
  }

  const user = data.user;
  const toolArea = document.getElementById("toolArea");
  const authStatus = document.getElementById("authStatus");

  if (user) {
    toolArea.style.display = "block";
    authStatus.textContent = "Eingeloggt als: " + user.email;
  } else {
    toolArea.style.display = "none";
    authStatus.textContent = "Nicht eingeloggt.";
  }
}
    
    let totalProfit = 0;

    itemsDiv.innerHTML = items.map((item) => {
      const buy = Number(item.buy_price || 0);
      const list = Number(item.list_price || 0);
      const profit = list - buy;
      totalProfit += profit;

      return `
        <div class="item">
          <strong>${item.title || ""}</strong><br>
          <span class="small">${item.brand || ""} · Größe ${item.size || "-"}</span><br>
          Einkauf: ${buy}€ · Listenpreis: ${list}€ ·
          <span class="profit">Gewinn: ${profit}€</span><br><br>
          <button class="danger" onclick="deleteItem('${item.id}')">Löschen</button>
        </div>
      `;
    }).join("");

    stats.innerHTML = `
      Items: <strong>${items.length}</strong><br>
      Möglicher Gesamtgewinn: <span class="profit">${totalProfit}€</span>
    `;
  }

  loadItems();
</script>
</body>
</html>
